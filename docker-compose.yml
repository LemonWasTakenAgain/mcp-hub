services:
  app:
    build: .
    ports:
      - "8500:8500"
    environment:
      MH_DATABASE_URL: postgresql+asyncpg://mcphub:mcphub@db:5432/mcphub
      MH_DEBUG: "true"
      MH_HOST: "0.0.0.0"
      MH_PORT: "8500"
      MH_PROXY_ENABLED: "true"
      MH_UPSTREAMS_CONFIG: "upstreams.yaml"

      # GitLab (local)
      MH_GITLAB_URL: "http://gitlab.steelcanvas.studio"
      MH_GITLAB_TOKEN: "${MH_GITLAB_TOKEN:-}"

      # Upstream API keys — set these to enable upstream servers
      MH_GITHUB_TOKEN: "${MH_GITHUB_TOKEN:-}"
      MH_BRAVE_API_KEY: "${MH_BRAVE_API_KEY:-}"
      MH_TAVILY_API_KEY: "${MH_TAVILY_API_KEY:-}"
      MH_EXA_API_KEY: "${MH_EXA_API_KEY:-}"
      MH_OPENAI_API_KEY: "${MH_OPENAI_API_KEY:-}"
      MH_HF_TOKEN: "${MH_HF_TOKEN:-}"
      MH_WOLFRAM_APP_ID: "${MH_WOLFRAM_APP_ID:-}"

      # Monitoring upstreams
      MH_PROMETHEUS_URL: "${MH_PROMETHEUS_URL:-http://prometheus.steelcanvas.studio}"
      MH_GRAFANA_URL: "${MH_GRAFANA_URL:-http://grafana.steelcanvas.studio}"
      MH_GRAFANA_API_KEY: "${MH_GRAFANA_API_KEY:-}"

      # Database upstreams
      MH_PROXY_POSTGRES_URL: "${MH_PROXY_POSTGRES_URL:-}"
      MH_REDIS_URL: "${MH_REDIS_URL:-}"

      # S3/MinIO
      MH_S3_ACCESS_KEY: "${MH_S3_ACCESS_KEY:-}"
      MH_S3_SECRET_KEY: "${MH_S3_SECRET_KEY:-}"
      MH_S3_ENDPOINT: "${MH_S3_ENDPOINT:-}"

      # Filesystem
      MH_FS_ALLOWED_DIRS: "${MH_FS_ALLOWED_DIRS:-/home/lemon/projects,/home/lemon/shared}"

      # Infrastructure upstreams
      MH_ARGOCD_URL: "${MH_ARGOCD_URL:-https://argocd.steelcanvas.studio}"
      MH_ARGOCD_TOKEN: "${MH_ARGOCD_TOKEN:-}"
      MH_LOKI_URL: "${MH_LOKI_URL:-http://loki.steelcanvas.studio}"
      MH_VAULT_URL: "${MH_VAULT_URL:-http://vault.steelcanvas.studio}"
      MH_VAULT_TOKEN: "${MH_VAULT_TOKEN:-}"
      MH_SONARQUBE_URL: "${MH_SONARQUBE_URL:-http://sonarqube.steelcanvas.studio}"
      MH_SONARQUBE_TOKEN: "${MH_SONARQUBE_TOKEN:-sqa_32310e0ba1866997dea494b628ad256239e4113e}"
      MH_NETBOX_URL: "${MH_NETBOX_URL:-http://netbox.steelcanvas.studio}"
      MH_NETBOX_TOKEN: "${MH_NETBOX_TOKEN:-c306b72d-43d2-4df5-a28b-2159dc9284c0}"
      MH_PROXMOX_URL: "${MH_PROXMOX_URL:-https://192.168.1.10:8006}"
      MH_PROXMOX_TOKEN_ID: "${MH_PROXMOX_TOKEN_ID:-root@pam!mcp-hub}"
      MH_PROXMOX_TOKEN_SECRET: "${MH_PROXMOX_TOKEN_SECRET:-cb237242-1f88-457a-b589-c9688c8b6fc8}"
      MH_N8N_URL: "${MH_N8N_URL:-http://n8n.steelcanvas.studio}"
      MH_N8N_API_KEY: "${MH_N8N_API_KEY:-660c524a-4501-4361-bcc9-569691746578}"
    volumes:
      - ${HOME}/.git-credentials:/run/secrets/git-credentials:ro
      - ${HOME}/.kube:/home/lemon/.kube:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mcphub
      POSTGRES_USER: mcphub
      POSTGRES_PASSWORD: mcphub
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcphub"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
