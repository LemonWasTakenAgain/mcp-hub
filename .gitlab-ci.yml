stages:
  - lint
  - test
  - security
  - build
  - deploy
  - mirror

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  PYTHON_IMAGE: $CI_REGISTRY_IMAGE/python:3.11-slim

# -- Lint --

lint:ruff:
  stage: lint
  image: $PYTHON_IMAGE
  script:
    - pip install ruff
    - ruff check .
    - ruff format --check .
  cache:
    key: "${CI_JOB_NAME}-pip"
    paths:
      - .pip-cache/
  rules:
    - changes:
        - "*.md"
        - "docs/**"
        - "LICENSE"
      when: never
    - when: on_success

lint:mypy:
  stage: lint
  image: $PYTHON_IMAGE
  script:
    - pip install mypy .[dev]
    - mypy mcp_hub/
  allow_failure: true
  cache:
    key: "${CI_JOB_NAME}-pip"
    paths:
      - .pip-cache/
  rules:
    - changes:
        - "*.md"
        - "docs/**"
        - "LICENSE"
      when: never
    - when: on_success

# -- Test --

test:unit:
  stage: test
  needs: []
  image: $PYTHON_IMAGE
  services:
    - postgres:16-alpine
  variables:
    POSTGRES_DB: mcphub_test
    POSTGRES_USER: mcphub
    POSTGRES_PASSWORD: mcphub
    MH_DATABASE_URL: postgresql+asyncpg://mcphub:mcphub@postgres:5432/mcphub_test
  script:
    - pip install .[dev]
    - pytest --cov=mcp_hub --cov-report=term-missing -v --cov-fail-under=30
  coverage: '/TOTAL.*\s+(\d+%)$/'
  cache:
    key: "${CI_JOB_NAME}-pip"
    paths:
      - .pip-cache/
  rules:
    - changes:
        - "*.md"
        - "docs/**"
        - "LICENSE"
      when: never
    - when: on_success

test:security:
  stage: test
  needs: []
  image: $PYTHON_IMAGE
  script:
    - pip install bandit safety
    - bandit -r mcp_hub/ -ll
    - safety check --bare 2>/dev/null || true
  allow_failure: false
  cache:
    key: "${CI_JOB_NAME}-pip"
    paths:
      - .pip-cache/
  rules:
    - changes:
        - "*.md"
        - "docs/**"
        - "LICENSE"
      when: never
    - when: on_success

# -- Security --

security:gitleaks:
  extends: .gitleaks-scan
  rules:
    - changes:
        - "*.md"
        - "docs/**"
        - "LICENSE"
      when: never
    - when: on_success

# -- Build --

build:docker:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  variables:
    IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
    PYTHON_BASE: $CI_REGISTRY_IMAGE/python:3.11-slim
  before_script:
    - |
      # Configure Kaniko to trust self-signed / default Traefik certs
      mkdir -p /kaniko/.docker
      echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(printf "%s:%s" "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context $CI_PROJECT_DIR
      --dockerfile $CI_PROJECT_DIR/Dockerfile
      --build-arg PYTHON_BASE=$PYTHON_BASE
      --destination $IMAGE_TAG
      --destination $IMAGE_LATEST
      --skip-tls-verify
      --cache=true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

# -- Deploy --

deploy:k8s:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl set image deployment/mcp-hub mcp-hub=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA -n steelcanvas
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

# ── Mirror: Push to GitHub backup ─────────────────────────────────────────────
include:
  - project: 'user-projects/claude-standards'
    file: '/ci-templates/generic-security.yml'
    ref: main
  - project: 'user-projects/claude-standards'
    file: '/ci-templates/github-mirror.yml'
    ref: main

mirror:github:
  extends: .github-mirror
  variables:
    GITHUB_REPO_URL: "git@github.com:LemonWasTakenAgain/mcp-hub.git"
